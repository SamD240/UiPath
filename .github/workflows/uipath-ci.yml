name: UiPath CI - Self Hosted

on:
  push:
    branches:
      - main

- name: Download UiPath CLI
  run: |
    Invoke-WebRequest -Uri "https://uipath.visualstudio.com/Public.Feeds/_artifacts/feed/UiPath-Official/NuGet/UiPath.CLI/overview/25.4.9414.17608" -OutFile uipcli.nupkg

- name: Extract UiPath CLI
  run: |
    Expand-Archive uipcli.nupkg -DestinationPath uipcli

- name: Run UiPath CLI
  run: |
    .\uipcli\tools\uipcli.exe --version
